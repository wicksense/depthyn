<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Depthyn 3D Viewer</title>
    <link rel="stylesheet" href="viewer3d.css">
  </head>
  <body>
    <div id="canvas-container">
      <canvas id="range-canvas"></canvas>
    </div>

    <header id="top-bar">
      <div class="top-left">
        <h1>Depthyn</h1>
        <span class="subtitle" id="status-label">No data loaded</span>
      </div>
      <div class="top-right">
        <div id="reference-frame-switch">
          <button id="btn-ref-sensor" class="mode-btn" type="button">Sensor</button>
          <button id="btn-ref-world" class="mode-btn" type="button">World</button>
        </div>
        <div id="view-mode-switch">
          <button id="btn-view-spatial" class="mode-btn is-active" type="button">Spatial</button>
          <button id="btn-view-scanline" class="mode-btn" type="button">Scanline</button>
        </div>
        <label class="file-btn">
          Open Replay
          <input id="file-input" type="file" accept=".json,application/json">
        </label>
      </div>
    </header>

    <div id="playback-bar">
      <button id="btn-prev" title="Previous frame">&lsaquo;</button>
      <button id="btn-play" title="Play / Pause">Play</button>
      <button id="btn-next" title="Next frame">&rsaquo;</button>
      <div id="frame-slider-wrap">
        <div id="frame-event-markers"></div>
        <input id="frame-slider" type="range" min="0" max="0" value="0">
      </div>
      <span id="frame-counter">0 / 0</span>
      <label>
        Speed
        <select id="speed-select">
          <option value="4">4x</option>
          <option value="2">2x</option>
          <option value="1" selected>1x</option>
          <option value="0.5">0.5x</option>
          <option value="0.25">0.25x</option>
        </select>
      </label>
    </div>

    <aside id="sidebar">
      <section id="info-panel">
        <h2>Scene</h2>
        <dl id="scene-stats"></dl>
      </section>
      <section id="layers-panel">
        <h2>Point Layers</h2>
        <div id="layer-controls">
          <label class="toggle-row">
            <input id="toggle-raw-points" type="checkbox" checked>
            <span>Raw points</span>
          </label>
          <label class="toggle-row">
            <input id="toggle-object-points" type="checkbox" checked>
            <span>Object points</span>
          </label>
          <label class="toggle-row">
            <input id="toggle-selected-points" type="checkbox" checked>
            <span>Focused points</span>
          </label>
          <label class="toggle-row">
            <input id="toggle-boxes" type="checkbox" checked>
            <span>Boxes</span>
          </label>
          <label class="toggle-row">
            <input id="toggle-trails" type="checkbox" checked>
            <span>Track trails</span>
          </label>
          <label class="toggle-row">
            <input id="toggle-motion" type="checkbox" checked>
            <span>Motion vector</span>
          </label>
          <label class="toggle-row">
            <input id="toggle-events" type="checkbox" checked>
            <span>Events</span>
          </label>
        </div>
      </section>
      <section id="classes-panel">
        <h2>Classifications</h2>
        <div id="class-controls"></div>
      </section>
      <section id="objects-panel">
        <h2>Objects</h2>
        <div id="object-list"></div>
      </section>
      <section id="rules-panel">
        <h2>Rules</h2>
        <div id="rule-controls">
          <div class="rule-actions">
            <button id="btn-add-zone" type="button">Add Zone</button>
            <button id="btn-add-tripwire" type="button">Add Tripwire</button>
          </div>
          <div class="rule-actions">
            <button id="btn-load-saved-rules" type="button">Load Saved</button>
            <button id="btn-save-rules" type="button">Save Rules</button>
          </div>
          <div class="rule-actions">
            <label class="rule-file-btn">
              Import Rules
              <input id="rule-file-input" type="file" accept=".json,application/json">
            </label>
            <button id="btn-apply-rules" type="button">Apply Rules</button>
          </div>
          <div class="rule-actions">
            <button id="btn-reset-rule-preview" type="button">Reset Preview</button>
            <button id="btn-export-rules-json" type="button">Export Rules JSON</button>
          </div>
          <div class="rule-actions">
            <button id="btn-cancel-rule-draw" type="button">Cancel Draw</button>
            <button id="btn-clear-rules" type="button">Clear Rules</button>
          </div>
          <div id="rule-draw-status">No authoring action in progress.</div>
        </div>
        <div id="rule-list"></div>
      </section>
      <section id="events-panel">
        <h2>Events</h2>
        <div id="event-summary"></div>
        <div id="event-controls">
          <label class="filter-row">
            <span>Type</span>
            <select id="event-filter-type">
              <option value="all">All</option>
            </select>
          </label>
          <label class="filter-row">
            <span>Class</span>
            <select id="event-filter-class">
              <option value="all">All</option>
            </select>
          </label>
          <label class="filter-row">
            <span>Rule</span>
            <select id="event-filter-rule">
              <option value="all">All</option>
            </select>
          </label>
          <div class="event-actions">
            <button id="btn-export-events-json" type="button">Export JSON</button>
            <button id="btn-export-events-csv" type="button">Export CSV</button>
          </div>
        </div>
        <div id="event-list"></div>
      </section>
      <section id="overlays-panel">
        <h2>Overlays</h2>
        <div id="overlay-controls">
          <label class="toggle-row">
            <input id="toggle-world-axes" type="checkbox" checked>
            <span>World axes</span>
          </label>
          <label class="toggle-row">
            <input id="toggle-ego-marker" type="checkbox" checked>
            <span>Ego marker</span>
          </label>
        </div>
      </section>
      <section id="legend-panel">
        <h2>Legend</h2>
        <ul id="legend-list"></ul>
      </section>
    </aside>

    <div id="inspect-panel" style="display:none;">
      <div class="inspect-header">
        <h2>Object Detail</h2>
        <button id="inspect-close" title="Close">&times;</button>
      </div>
      <dl id="inspect-content"></dl>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
    </script>
    <script type="module" src="viewer3d.js"></script>
  </body>
</html>
